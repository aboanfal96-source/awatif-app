const LESSONS=[
{id:"1-1",title:"المعادلات",desc:"مفهوم المعادلة والمتغير والثابت",icon:"📝",unit:"ف1: المعادلات الخطية",content:"المعادلة هي جملة رياضية تحتوي على علامة المساواة (=). تتكون من طرفين متساويين.\nالمتغير: رمز يمثل قيمة مجهولة مثل س\nالثابت: عدد معروف القيمة\n\nمثال: ٢س + ٣ = ٧\nالمتغير: س | الثوابت: ٢، ٣، ٧"},
{id:"1-2",title:"حل المعادلات ذات الخطوة الواحدة",desc:"استخدام العملية العكسية لعزل المتغير",icon:"➕",unit:"ف1: المعادلات الخطية",content:"لحل المعادلة نستخدم العملية العكسية:\n• عكس الجمع ← الطرح\n• عكس الطرح ← الجمع\n• عكس الضرب ← القسمة\n• عكس القسمة ← الضرب\n\nمثال: س + ٥ = ١٢\nنطرح ٥ من الطرفين: س = ٧"},
{id:"1-3",title:"حل المعادلات المتعددة الخطوات",desc:"معادلات تحتاج أكثر من خطوة",icon:"🔢",unit:"ف1: المعادلات الخطية",content:"الخطوات:\n١. تبسيط كل طرف\n٢. نقل المتغيرات لطرف والثوابت للآخر\n٣. عزل المتغير\n\nمثال: ٣س + ٢ = ١٤\nنطرح ٢: ٣س = ١٢\nنقسم على ٣: س = ٤"},
{id:"1-4",title:"المعادلات بمتغير في طرفيها",desc:"حل معادلات فيها المتغير في كلا الطرفين",icon:"⚖️",unit:"ف1: المعادلات الخطية",content:"نجمع حدود المتغير في طرف واحد.\n\nمثال: ٥س + ٣ = ٢س + ١٢\nنطرح ٢س: ٣س + ٣ = ١٢\nنطرح ٣: ٣س = ٩\nس = ٣"},
{id:"1-5",title:"القيمة المطلقة",desc:"مفهوم القيمة المطلقة وحل معادلاتها",icon:"| |",unit:"ف1: المعادلات الخطية",content:"|أ| = المسافة بين أ والصفر (دائماً ≥ ٠)\n\nلحل |عبارة| = عدد:\nالحالة ١: العبارة = العدد\nالحالة ٢: العبارة = -العدد\n\nمثال: |س - ٣| = ٥\nس = ٨ أو س = -٢"},
{id:"2-1",title:"العلاقات",desc:"مفهوم العلاقة والمجال والمدى",icon:"🔗",unit:"ف1: العلاقات والدوال الخطية",content:"العلاقة: مجموعة أزواج مرتبة (س، ص)\nالمجال: قيم س (المدخلات)\nالمدى: قيم ص (المخرجات)\n\nمثال: {(١،٣)، (٢،٥)، (٣،٧)}\nالمجال = {١، ٢، ٣}\nالمدى = {٣، ٥، ٧}"},
{id:"2-2",title:"الدوال",desc:"مفهوم الدالة واختبار الخط الرأسي",icon:"📈",unit:"ف1: العلاقات والدوال الخطية",content:"الدالة: كل عنصر من المجال يرتبط بعنصر واحد فقط من المدى.\n\nاختبار الخط الرأسي: إذا قطع أي خط رأسي الرسم في أكثر من نقطة ← ليست دالة\n\nص = ٢س + ١ ← دالة ✅"},
{id:"2-3",title:"تمثيل المعادلات الخطية بيانياً",desc:"رسم المعادلات على المستوى الإحداثي",icon:"📊",unit:"ف1: العلاقات والدوال الخطية",content:"الخطوات:\n١. اختر قيمتين لـ س\n٢. عوّض لإيجاد ص\n٣. حدد النقاط وصل بينها\n\nمثال: ص = ٢س - ١\nس=٠ → ص=-١\nس=٢ → ص=٣"},
{id:"2-4",title:"معدل التغير والميل",desc:"حساب الميل ومعدل التغير",icon:"📐",unit:"ف1: العلاقات والدوال الخطية",content:"الميل = (ص٢ - ص١) ÷ (س٢ - س١)\n\n• موجب: يصعد ↗️\n• سالب: ينزل ↘️\n• صفر: أفقي ➡️\n• غير معرف: رأسي ⬆️"},
{id:"3-1",title:"صيغة الميل والمقطع",desc:"ص = مس + ب",icon:"✏️",unit:"ف1: الدوال الخطية",content:"ص = مس + ب\nم = الميل\nب = المقطع الصادي\n\nمثال: ص = ٣س + ٢\nالميل = ٣، المقطع = ٢"},
{id:"3-2",title:"المستقيمات المتوازية والمتعامدة",desc:"العلاقة بين ميول المستقيمات",icon:"⊥",unit:"ف1: الدوال الخطية",content:"متوازية: م١ = م٢\nمتعامدة: م١ × م٢ = -١\n\nمثال:\nص=٢س+٣ و ص=٢س-١ ← متوازيان\nص=٢س+٣ و ص=-½س+١ ← متعامدان"},
{id:"4-1",title:"المتباينات الخطية",desc:"حل المتباينات وتمثيلها",icon:"<>",unit:"ف1: المتباينات الخطية",content:"الرموز: > ، < ، ≥ ، ≤\n\n⚠️ عند الضرب أو القسمة على سالب ← ينعكس الاتجاه!\n\nمثال: -٢س > ٦\nنقسم على -٢ ونعكس: س < -٣"},
{id:"5-1",title:"أنظمة المعادلات بيانياً",desc:"إيجاد نقطة تقاطع مستقيمين",icon:"✖️",unit:"ف2: أنظمة المعادلات",content:"الحل = نقطة التقاطع\n• حل وحيد: يتقاطعان\n• لا حل: متوازيان\n• عدد لا نهائي: متطابقان"},
{id:"5-2",title:"حل بالتعويض",desc:"طريقة التعويض لحل الأنظمة",icon:"🔄",unit:"ف2: أنظمة المعادلات",content:"١. اعزل متغير\n٢. عوّض في المعادلة الأخرى\n٣. حل\n\nمثال:\nص = ٢س + ١\n٣س + ص = ١١\n٣س + ٢س + ١ = ١١\nس = ٢، ص = ٥"},
{id:"5-3",title:"حل بالحذف",desc:"طريقة الحذف بالجمع أو الطرح",icon:"🗑️",unit:"ف2: أنظمة المعادلات",content:"نجعل معاملات متغير متساوية ثم نجمع أو نطرح.\n\nمثال:\n٢س + ٣ص = ٧\n٢س - ص = ٣\nبالطرح: ٤ص = ٤ → ص = ١، س = ٢"},
{id:"6-1",title:"ضرب وحيدات الحد",desc:"قواعد الأسس في الضرب",icon:"✕",unit:"ف2: كثيرات الحدود",content:"أᵐ × أⁿ = أᵐ⁺ⁿ\n(أᵐ)ⁿ = أᵐˣⁿ\n\nمثال: ٣س² × ٤س³ = ١٢س⁵"},
{id:"6-2",title:"جمع وطرح كثيرات الحدود",desc:"العمليات على كثيرات الحدود",icon:"➕",unit:"ف2: كثيرات الحدود",content:"نجمع/نطرح الحدود المتشابهة\n\nمثال:\n(٣س² + ٢س + ١) + (س² - ٣س + ٤)\n= ٤س² - س + ٥"},
{id:"7-1",title:"التحليل بإخراج العامل المشترك",desc:"تحليل العبارات الجبرية",icon:"🔍",unit:"ف2: التحليل",content:"نستخرج ع.م.أ من جميع الحدود\n\nمثال: ٦س³ + ٩س²\n= ٣س²(٢س + ٣)"},
{id:"7-2",title:"المعادلات التربيعية بالتحليل",desc:"حل بالتحليل لعاملين",icon:"📐",unit:"ف2: التحليل",content:"س² + ٥س + ٦ = ٠\n= (س + ٢)(س + ٣) = ٠\nس = -٢ أو س = -٣"},
{id:"8-1",title:"الدوال التربيعية بيانياً",desc:"رسم القطع المكافئ",icon:"⌐",unit:"ف2: الدوال التربيعية",content:"ص = أس² + بس + جـ\nالرسم: قطع مكافئ\nمحور التماثل: س = -ب/(٢أ)\nأ>٠: مفتوح للأعلى ∪\nأ<٠: مفتوح للأسفل ∩"},
{id:"8-2",title:"القانون العام",desc:"حل المعادلات التربيعية بالقانون العام",icon:"📏",unit:"ف2: الدوال التربيعية",content:"س = (-ب ± √(ب²-٤أجـ)) / (٢أ)\n\nالمميز = ب²-٤أجـ\n>٠: حلّان\n=٠: حل واحد\n<٠: لا حل حقيقي"},
{id:"9-1",title:"تبسيط الجذور",desc:"تبسيط العبارات الجذرية",icon:"√",unit:"ف2: المعادلات الجذرية والمثلثات",content:"√(أ×ب) = √أ × √ب\n\nمثال: √٧٢ = √(٣٦×٢) = ٦√٢"},
{id:"9-2",title:"نظرية فيثاغورس",desc:"العلاقة بين أضلاع المثلث القائم",icon:"📐",unit:"ف2: المعادلات الجذرية والمثلثات",content:"أ² + ب² = جـ² (جـ = الوتر)\n\nمثال: أ=٣، ب=٤\nجـ² = ٩+١٦ = ٢٥\nجـ = ٥"},
{id:"9-3",title:"النسب المثلثية",desc:"جا، جتا، ظا",icon:"🔺",unit:"ف2: المعادلات الجذرية والمثلثات",content:"جا = مقابل/وتر\nجتا = مجاور/وتر\nظا = مقابل/مجاور"},
{id:"10-1",title:"الإحصاء",desc:"تصميم دراسة مسحية وتحليلها",icon:"📊",unit:"ف2: الإحصاء والاحتمال",content:"العينات: عشوائية، طبقية، منتظمة\nمقاييس النزعة: المتوسط، الوسيط، المنوال"},
{id:"10-2",title:"التباديل والتوافيق",desc:"طرق العد والاحتمالات",icon:"🎲",unit:"ف2: الإحصاء والاحتمال",content:"تباديل (ترتيب مهم): ل(ن،ر) = ن!/(ن-ر)!\nتوافيق (بدون ترتيب): ق(ن،ر) = ن!/(ر!(ن-ر)!)\n\nاختيار ٣ من ٥: توافيق = ١٠"},
];

function Card({children,style={},onClick}){return <div onClick={onClick} className="fade-in" style={{background:"rgba(20,15,50,0.6)",borderRadius:16,border:"1px solid rgba(139,92,246,0.12)",padding:20,backdropFilter:"blur(10px)",transition:"all 0.25s",...(onClick?{cursor:"pointer"}:{}),...style}}>{children}</div>}
function PT({icon,title,sub}){return <div style={{marginBottom:28}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}><span style={{fontSize:28}}>{icon}</span><h2 style={{margin:0,fontSize:22,fontWeight:700,background:"linear-gradient(135deg,#c4b5fd,#67e8f9)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{title}</h2></div>{sub&&<p style={{margin:"4px 0 0 40px",fontSize:13,color:"#8b8b9e"}}>{sub}</p>}</div>}
function SC({icon,label,value,color}){return <Card style={{textAlign:"center",minWidth:120}}><div style={{fontSize:28,marginBottom:6}}>{icon}</div><div style={{fontSize:24,fontWeight:700,color:color||"#c4b5fd"}}>{value}</div><div style={{fontSize:12,color:"#8b8b9e",marginTop:2}}>{label}</div></Card>}

// AI Quiz
async function genAIQuiz(title,content){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:`أنت معلم رياضيات. أنشئ ٥ أسئلة اختيار من متعدد عن "${title}".\nالمحتوى: ${content}\nأجب بJSON فقط بدون أي نص:\n[{"q":"السؤال","options":["أ","ب","ج","د"],"correct":0}]`}]})});
  const d=await res.json();const t=d.content?.[0]?.text||"";return JSON.parse(t.replace(/\`\`\`json|\`\`\`/g,"").trim());
}

// Login
function Login({students,updateStudents,onLogin}){
  const[mode,setMode]=useState("select");const[name,setName]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");
  const doT=()=>{if(pw==="awatif2026")onLogin({name:"أ. عواطف العتيبي",role:"teacher"});else setErr("كلمة المرور غير صحيحة")};
  const doR=()=>{const t=name.trim();if(!t){setErr("الرجاء إدخال الاسم");return}if(students.find(s=>s.name===t)){setErr("مسجل مسبقاً");return}updateStudents([...students,{name:t,id:"s"+Date.now(),joinDate:new Date().toISOString()}]);onLogin({name:t,role:"student"})};
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#0a0e27,#1a1040 40%,#0d1a3a)",padding:16}}>
    <div style={{width:"100%",maxWidth:440}}><div style={{background:"rgba(20,15,50,0.85)",borderRadius:24,border:"1px solid rgba(139,92,246,0.2)",backdropFilter:"blur(20px)",padding:"40px 32px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:"60%",height:2,background:"linear-gradient(90deg,transparent,#8b5cf6,#06b6d4,transparent)"}}/>
      <div style={{textAlign:"center",marginBottom:32}}><div style={{width:72,height:72,borderRadius:18,background:"linear-gradient(135deg,#8b5cf6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 16px",boxShadow:"0 8px 32px rgba(139,92,246,0.3)"}}>📐</div><h1 style={{margin:0,fontSize:26,fontWeight:800,background:"linear-gradient(135deg,#c4b5fd,#67e8f9)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>منصة عواطف</h1><p style={{margin:"6px 0 0",fontSize:13,color:"#8b8b9e"}}>رياضيات الصف الثالث المتوسط</p></div>
      {mode==="select"&&<div style={{display:"flex",flexDirection:"column",gap:12}}><button onClick={()=>setMode("teacher")} style={lbS("linear-gradient(135deg,#f59e0b,#ef4444)")}>👩‍🏫 دخول المعلمة</button><button onClick={()=>setMode("student")} style={lbS("linear-gradient(135deg,#8b5cf6,#06b6d4)")}>👩‍🎓 دخول طالبة</button><button onClick={()=>setMode("register")} style={{...lbS("transparent"),border:"1px solid rgba(139,92,246,0.3)",color:"#c4b5fd"}}>✨ تسجيل طالبة جديدة</button></div>}
      {mode==="teacher"&&<div><input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("")}} placeholder="كلمة المرور" style={iS} onKeyDown={e=>e.key==="Enter"&&doT()}/>{err&&<p style={{color:"#f87171",fontSize:12,margin:"6px 0"}}>{err}</p>}<button onClick={doT} style={lbS("linear-gradient(135deg,#f59e0b,#ef4444)")}>دخول</button><button onClick={()=>{setMode("select");setErr("");setPw("")}} style={bkS}>← رجوع</button></div>}
      {mode==="student"&&<div>{students.length===0?<div style={{textAlign:"center",padding:20}}><p style={{color:"#8b8b9e"}}>لا توجد طالبات</p><button onClick={()=>setMode("register")} style={lbS("linear-gradient(135deg,#8b5cf6,#06b6d4)")}>تسجيل جديدة</button></div>:<div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:300,overflowY:"auto"}}>{students.map(s=><button key={s.id} onClick={()=>onLogin({name:s.name,role:"student"})} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.15)",borderRadius:12,cursor:"pointer",fontSize:14,fontFamily:"inherit",color:"#e8e6f0",direction:"rtl",textAlign:"right"}}><span style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#06b6d4,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>👩‍🎓</span>{s.name}</button>)}</div>}<button onClick={()=>setMode("select")} style={bkS}>← رجوع</button></div>}
      {mode==="register"&&<div><input value={name} onChange={e=>{setName(e.target.value);setErr("")}} placeholder="اسمك الكامل" style={iS} onKeyDown={e=>e.key==="Enter"&&doR()}/>{err&&<p style={{color:"#f87171",fontSize:12,margin:"6px 0"}}>{err}</p>}<button onClick={doR} style={lbS("linear-gradient(135deg,#8b5cf6,#06b6d4)")}>تسجيل ودخول</button><button onClick={()=>{setMode("select");setName("")}} style={bkS}>← رجوع</button></div>}
    </div></div>
  </div>;
}

function Home({user,isT,assignments,submissions,students,quizResults,announcements,updateAnnouncements,setPage}){

// Quizzes
function QuizP({isT,user,quizzes,updateQ,quizResults,updateQR}){
  const[sf,setSf]=useState(false);const[qt,setQt]=useState("");const[qs,setQs]=useState([{q:"",options:["","","",""],correct:0}]);const[aq,setAq]=useState(null);const[ans,setAns]=useState({});const[sr,setSr]=useState(null);
  const addQ=()=>setQs([...qs,{q:"",options:["","","",""],correct:0}]);
  const uQ=(i,f,v)=>{const u=[...qs];if(f==="q")u[i].q=v;else if(f==="correct")u[i].correct=v;else u[i].options[f]=v;setQs(u)};
  const create=()=>{if(!qt.trim()||qs.some(q=>!q.q.trim()||q.options.some(o=>!o.trim())))return;updateQ([{id:"qz"+Date.now(),title:qt.trim(),questions:qs,createdAt:new Date().toISOString()},...quizzes]);setQt("");setQs([{q:"",options:["","","",""],correct:0}]);setSf(false)};
  const submit=(qid)=>{const qz=quizzes.find(q=>q.id===qid);let sc=0;qz.questions.forEach((q,i)=>{if(ans[i]===q.correct)sc++});updateQR([{id:"qr"+Date.now(),quizId:qid,studentName:user.name,score:sc,total:qz.questions.length,submittedAt:new Date().toISOString()},...quizResults]);setSr({score:sc,total:qz.questions.length});setAq(null);setAns({})};
  if(sr)return <div><PT icon="📊" title="النتيجة"/><Card style={{textAlign:"center",padding:40}}><div style={{fontSize:64,marginBottom:16}}>{sr.score===sr.total?"🏆":sr.score>=sr.total/2?"👏":"💪"}</div><h3 style={{color:"#c4b5fd",fontSize:22}}>{sr.score}/{sr.total}</h3><p style={{color:"#8b8b9e",fontSize:14,marginTop:8}}>{sr.score===sr.total?"ممتازة! 🌟":sr.score>=sr.total/2?"أحسنتِ! 👍":"حاولي مرة أخرى 💪"}</p><button onClick={()=>setSr(null)} style={{marginTop:20,...btnP}}>رجوع</button></Card></div>;
  if(aq){const qz=quizzes.find(q=>q.id===aq);return <div><button onClick={()=>{setAq(null);setAns({})}} style={bkS}>← رجوع</button><PT icon="❓" title={qz.title}/>{qz.questions.map((q,qi)=><Card key={qi} style={{marginBottom:12}}><h4 style={{margin:"0 0 12px",fontSize:14,color:"#e8e6f0"}}>س{qi+1}: {q.q}</h4><div style={{display:"flex",flexDirection:"column",gap:8}}>{q.options.map((o,oi)=><button key={oi} onClick={()=>setAns({...ans,[qi]:oi})} style={{padding:"10px 14px",borderRadius:10,border:"1px solid",cursor:"pointer",fontSize:13,fontFamily:"inherit",textAlign:"right",background:ans[qi]===oi?"rgba(139,92,246,0.2)":"rgba(139,92,246,0.04)",borderColor:ans[qi]===oi?"rgba(139,92,246,0.5)":"rgba(139,92,246,0.1)",color:ans[qi]===oi?"#c4b5fd":"#9898ae"}}>{o}</button>)}</div></Card>)}<button onClick={()=>submit(aq)} disabled={Object.keys(ans).length<qz.questions.length} style={{...btnP,padding:"12px 30px",background:Object.keys(ans).length<qz.questions.length?"rgba(139,92,246,0.2)":"linear-gradient(135deg,#8b5cf6,#06b6d4)"}}>تسليم</button></div>}
  return <div><PT icon="❓" title={isT?"إدارة الاختبارات":"اختباراتي"}/>{isT&&<button onClick={()=>setSf(!sf)} style={{...btnP,marginBottom:16}}>+ اختبار جديد</button>}
    {sf&&<Card style={{marginBottom:16}}><input value={qt} onChange={e=>setQt(e.target.value)} placeholder="عنوان الاختبار" style={{...iS,marginBottom:12}}/>{qs.map((q,qi)=><div key={qi} style={{background:"rgba(139,92,246,0.06)",borderRadius:12,padding:14,marginBottom:10}}><input value={q.q} onChange={e=>uQ(qi,"q",e.target.value)} placeholder={"السؤال "+(qi+1)} style={{...iS,marginBottom:8}}/>{q.options.map((o,oi)=><div key={oi} style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}><input type="radio" name={"c"+qi} checked={q.correct===oi} onChange={()=>uQ(qi,"correct",oi)}/><input value={o} onChange={e=>uQ(qi,oi,e.target.value)} placeholder={"خيار "+(oi+1)} style={{...iS,flex:1,marginTop:0}}/></div>)}</div>)}<div style={{display:"flex",gap:8}}><button onClick={addQ} style={{padding:"8px 16px",background:"rgba(139,92,246,0.15)",border:"1px solid rgba(139,92,246,0.3)",borderRadius:8,color:"#c4b5fd",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>+ سؤال</button><button onClick={create} style={btnP}>إنشاء</button></div></Card>}
    <div style={{display:"flex",flexDirection:"column",gap:12}}>{quizzes.length===0?<Card><p style={{color:"#8b8b9e",textAlign:"center"}}>لا توجد اختبارات</p></Card>:quizzes.map(qz=>{const mr=!isT?quizResults.find(r=>r.quizId===qz.id&&r.studentName===user.name):null;const ar=quizResults.filter(r=>r.quizId===qz.id);

}

  const fm=fil==="all"?chatMessages:chatMessages.filter(m=>m.sender===fil||m.role==="teacher");
  return <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 80px)"}}><PT icon="💬" title="المحادثات"/>
    {isT&&<div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}><button onClick={()=>setFil("all")} style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontFamily:"inherit",background:fil==="all"?"rgba(139,92,246,0.25)":"rgba(139,92,246,0.06)",color:fil==="all"?"#c4b5fd":"#8b8b9e"}}>الكل</button>{students.map(s=><button key={s.name} onClick={()=>setFil(s.name)} style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontFamily:"inherit",background:fil===s.name?"rgba(139,92,246,0.25)":"rgba(139,92,246,0.06)",color:fil===s.name?"#c4b5fd":"#8b8b9e"}}>{s.name}</button>)}</div>}
    <Card style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",padding:0}}><div style={{flex:1,overflowY:"auto",padding:16}}>{fm.length===0?<p style={{color:"#8b8b9e",textAlign:"center",padding:40}}>💬</p>:fm.map(m=><div key={m.id} style={{display:"flex",justifyContent:m.sender===user.name?"flex-start":"flex-end",marginBottom:10}}><div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:14,background:m.role==="teacher"?"linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.1))":"rgba(139,92,246,0.1)",border:"1px solid "+(m.role==="teacher"?"rgba(245,158,11,0.2)":"rgba(139,92,246,0.15)")}}><div style={{fontSize:11,fontWeight:600,color:m.role==="teacher"?"#fbbf24":"#67e8f9",marginBottom:4}}>{m.sender}{m.role==="teacher"&&" 👩‍🏫"}</div><p style={{margin:0,fontSize:13,color:"#d4d2e0",lineHeight:1.6}}>{m.text}</p><div style={{fontSize:10,color:"#6b6b80",marginTop:4,textAlign:"left"}}>{new Date(m.timestamp).toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"})}</div></div></div>)}<div ref={ce}/></div>
      <div style={{display:"flex",gap:8,padding:14,borderTop:"1px solid rgba(139,92,246,0.1)"}}><input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="رسالتك..." style={{...iS,flex:1,marginTop:0}}/><button onClick={send} style={{width:44,height:44,borderRadius:12,...btnP,display:"flex",alignItems:"center",justifyContent:"center",padding:0,fontSize:16}}>◀</button></div>
    </Card></div>;
}

// Honor
function HonorP({isT,honorBoard,updateH,students}){const[n,setN]=useState("");const[r,setR]=useState("");const add=()=>{if(!n||!r.trim())return;updateH([{id:"h"+Date.now(),name:n,reason:r.trim(),date:new Date().toISOString()},...honorBoard]);setN("");setR("")};const md=["🥇","🥈","🥉"];
  return <div><PT icon="🏆" title="لوحة الشرف"/>{isT&&<Card style={{marginBottom:20}}><select value={n} onChange={e=>setN(e.target.value)} style={{...iS,marginBottom:8}}><option value="">اختاري الطالبة</option>{students.map(s=><option key={s.name} value={s.name}>{s.name}</option>)}</select><input value={r} onChange={e=>setR(e.target.value)} placeholder="سبب التكريم" style={{...iS,marginBottom:10}}/><button onClick={add} style={{...btnP,background:"linear-gradient(135deg,#f59e0b,#ef4444)"}}>تكريم 🌟</button></Card>}
    {honorBoard.length===0?<Card style={{textAlign:"center",padding:40}}><span style={{fontSize:48}}>🏆</span><p style={{color:"#8b8b9e",marginTop:12}}>فارغة</p></Card>:<div style={{display:"flex",flexDirection:"column",gap:12}}>{honorBoard.map((h,i)=><Card key={h.id} style={{display:"flex",alignItems:"center",gap:14,...(i<3?{background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.15)"}:{})}}><span style={{fontSize:32}}>{md[i]||"⭐"}</span><div style={{flex:1}}><h4 style={{margin:0,fontSize:15,fontWeight:600,color:i<3?"#fbbf24":"#e8e6f0"}}>{h.name}</h4><p style={{margin:"4px 0 0",fontSize:12,color:"#9898ae"}}>{h.reason}</p></div>{isT&&<button onClick={()=>updateH(honorBoard.filter(x=>x.id!==h.id))} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:14}}>✕</button>}</Card>)}</div>}</div>;
}

// Reports
function ReportsP({students,assignments,submissions,quizResults}){const avg=quizResults.length>0?(quizResults.reduce((s,r)=>s+(r.score/r.total*100),0)/quizResults.length).toFixed(1):0;const sr=assignments.length>0&&students.length>0?((submissions.length/(assignments.length*students.length))*100).toFixed(1):0;
  return <div><PT icon="📊" title="التقارير"/><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:24}}><SC icon="👩‍🎓" label="طالبات" value={students.length} color="#67e8f9"/><SC icon="📝" label="واجبات" value={assignments.length} color="#a78bfa"/><SC icon="📤" label="تسليمات" value={submissions.length} color="#34d399"/><SC icon="📈" label="معدل التسليم" value={sr+"%"} color="#fbbf24"/><SC icon="🎯" label="متوسط الدرجات" value={avg+"%"} color="#f87171"/></div>
    <Card><h3 style={{margin:"0 0 16px",fontSize:16,fontWeight:600,color:"#c4b5fd"}}>📋 الأداء</h3>{students.length===0?<p style={{color:"#8b8b9e",textAlign:"center"}}>لا طالبات</p>:<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{borderBottom:"1px solid rgba(139,92,246,0.15)"}}>{["الطالبة","واجبات","اختبارات","متوسط","الحالة"].map(h=><th key={h} style={{textAlign:h==="الطالبة"?"right":"center",padding:"10px 12px",color:"#a5a3b5",fontWeight:600,fontSize:12}}>{h}</th>)}</tr></thead><tbody>{students.map(s=>{const ms=submissions.filter(x=>x.studentName===s.name);const mr=quizResults.filter(x=>x.studentName===s.name);const ma=mr.length>0?(mr.reduce((sum,r)=>sum+(r.score/r.total*100),0)/mr.length).toFixed(0):"-";const st=ms.length>=assignments.length*0.8?"ممتازة":ms.length>=assignments.length*0.5?"جيدة":"متابعة";const sc=st==="ممتازة"?"#34d399":st==="جيدة"?"#fbbf24":"#f87171";
        return <tr key={s.name} style={{borderBottom:"1px solid rgba(139,92,246,0.06)"}}><td style={{padding:"10px 12px",color:"#d4d2e0"}}>{s.name}</td><td style={{textAlign:"center",padding:"10px 12px",color:"#d4d2e0"}}>{ms.length}/{assignments.length}</td><td style={{textAlign:"center",padding:"10px 12px",color:"#d4d2e0"}}>{mr.length}</td><td style={{textAlign:"center",padding:"10px 12px",color:ma!=="-"?(parseInt(ma)>=70?"#34d399":"#f87171"):"#8b8b9e"}}>{ma}{ma!=="-"?"%":""}</td><td style={{textAlign:"center",padding:"10px 12px"}}><span style={{padding:"3px 10px",borderRadius:6,fontSize:11,background:sc+"15",color:sc}}>{st}</span></td></tr>})}</tbody></table></div>}</Card></div>;
}

function LinksP(){return <div><PT icon="🔗" title="روابط مهمة"/><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:12}}>{LINKS.map(l=><a key={l.url} href={l.url} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}><Card><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:32}}>{l.icon}</span><div><h4 style={{margin:0,fontSize:14,fontWeight:600,color:"#c4b5fd"}}>{l.title}</h4><p style={{margin:"4px 0 0",fontSize:12,color:"#8b8b9e"}}>{l.desc}</p></div></div></Card></a>)}</div></div>}

function StudentsP({students,updateStudents,submissions,quizResults}){const[nn,setNn]=useState("");const add=()=>{const t=nn.trim();if(!t||students.find(s=>s.name===t))return;updateStudents([...students,{name:t,id:"s"+Date.now()}]);setNn("")};
  return <div><PT icon="👩‍🎓" title="إدارة الطالبات"/><Card style={{marginBottom:20}}><div style={{display:"flex",gap:8}}><input value={nn} onChange={e=>setNn(e.target.value)} placeholder="اسم الطالبة" style={{...iS,flex:1,marginTop:0}} onKeyDown={e=>e.key==="Enter"&&add()}/><button onClick={add} style={btnP}>إضافة</button></div></Card>
    {students.length===0?<Card><p style={{color:"#8b8b9e",textAlign:"center"}}>لا طالبات</p></Card>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{students.map(s=><Card key={s.id} style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#06b6d4,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👩‍🎓</div><div style={{flex:1}}><h4 style={{margin:0,fontSize:14,fontWeight:600,color:"#e8e6f0"}}>{s.name}</h4><p style={{margin:0,fontSize:11,color:"#8b8b9e"}}>{submissions.filter(x=>x.studentName===s.name).length} واجب • {quizResults.filter(x=>x.studentName===s.name).length} اختبار</p></div><button onClick={()=>{if(confirm("حذف "+s.name+"؟"))updateStudents(students.filter(x=>x.name!==s.name))}} style={{padding:"6px 12px",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:8,color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>حذف</button></Card>)}</div>}</div>;
}

// APP
function App(){
  const[cu,setCu]=useState(null);const[page,setPage]=useState("home");const[so,setSo]=useState(false);const[isMobile,setIsMobile]=useState(window.innerWidth<=768);
  const[students,setStudents]=useState(()=>load(SK.STU,[]));const[assignments,setAssignments]=useState(()=>load(SK.ASN,[]));const[submissions,setSubmissions]=useState(()=>load(SK.SUB,[]));const[quizzes,setQuizzes]=useState(()=>load(SK.QZ,[]));const[quizResults,setQuizResults]=useState(()=>load(SK.QR,[]));const[chatMessages,setChatMessages]=useState(()=>load(SK.CH,[]));const[honorBoard,setHonorBoard]=useState(()=>load(SK.HN,[]));const[announcements,setAnnouncements]=useState(()=>load(SK.AN,[]));const[teacherContent,setTeacherContent]=useState(()=>load(SK.TC,{}));
  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h)},[]);
  const up=(setter,key)=>(data)=>{setter(data);save(key,data)};
  const uStu=up(setStudents,SK.STU),uAsn=up(setAssignments,SK.ASN),uSub=up(setSubmissions,SK.SUB),uQz=up(setQuizzes,SK.QZ),uQR=up(setQuizResults,SK.QR),uCh=up(setChatMessages,SK.CH),uHn=up(setHonorBoard,SK.HN),uAn=up(setAnnouncements,SK.AN),uTC=up(setTeacherContent,SK.TC);
  const isT=cu?.role==="teacher";
  if(!cu)return <Login students={students} updateStudents={uStu} onLogin={setCu}/>;
  const nav=isT?[{id:"home",l:"الرئيسية",i:"🏠"},{id:"lessons",l:"الدروس",i:"📚"},{id:"assignments",l:"الواجبات",i:"📝"},{id:"quizzes",l:"الاختبارات",i:"❓"},{id:"chat",l:"المحادثات",i:"💬"},{id:"honor",l:"لوحة الشرف",i:"🏆"},{id:"reports",l:"التقارير",i:"📊"},{id:"links",l:"الروابط",i:"🔗"},{id:"students",l:"الطالبات",i:"👩‍🎓"}]:[{id:"home",l:"الرئيسية",i:"🏠"},{id:"lessons",l:"الدروس",i:"📚"},{id:"assignments",l:"واجباتي",i:"📝"},{id:"quizzes",l:"اختباراتي",i:"❓"},{id:"chat",l:"المحادثات",i:"💬"},{id:"honor",l:"لوحة الشرف",i:"🏆"},{id:"links",l:"الروابط",i:"🔗"}];
  return <div style={{display:"flex",minHeight:"100vh"}}>
    {isMobile&&<button onClick={()=>setSo(!so)} style={{position:"fixed",top:12,right:12,zIndex:1001,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(139,92,246,0.3)",border:"1px solid rgba(139,92,246,0.5)",color:"#fff",borderRadius:10,width:42,height:42,cursor:"pointer",fontSize:20}}>☰</button>}
    <aside style={{width:260,background:"rgba(15,10,40,0.95)",borderLeft:"1px solid rgba(139,92,246,0.15)",padding:"24px 0",display:"flex",flexDirection:"column",position:"fixed",top:0,right:0,height:"100vh",zIndex:1000,backdropFilter:"blur(20px)",transition:"transform 0.3s",...(isMobile?{transform:so?"translateX(0)":"translateX(100%)"}:{})}}>
      <div style={{padding:"0 20px",marginBottom:32}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#8b5cf6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>📐</div><div><h1 style={{margin:0,fontSize:17,fontWeight:700,background:"linear-gradient(135deg,#c4b5fd,#67e8f9)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>منصة عواطف</h1><p style={{margin:0,fontSize:11,color:"#8b8b9e"}}>رياضيات ٣م</p></div></div></div>
      <div style={{margin:"0 12px 20px",background:"rgba(139,92,246,0.08)",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}><div style={{width:32,height:32,borderRadius:8,background:isT?"linear-gradient(135deg,#f59e0b,#ef4444)":"linear-gradient(135deg,#06b6d4,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{isT?"👩‍🏫":"👩‍🎓"}</div><div><div style={{fontSize:13,fontWeight:600}}>{cu.name}</div><div style={{fontSize:10,color:"#8b8b9e"}}>{isT?"المعلمة":"طالبة"}</div></div></div>
      <nav style={{flex:1,padding:"0 10px",overflowY:"auto"}}>{nav.map(({id,l,i})=><button key={id} onClick={()=>{setPage(id);setSo(false)}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 14px",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:page===id?600:400,fontFamily:"inherit",direction:"rtl",textAlign:"right",background:page===id?"linear-gradient(135deg,rgba(139,92,246,0.25),rgba(6,182,212,0.15))":"transparent",color:page===id?"#c4b5fd":"#9898ae",marginBottom:2}}><span style={{fontSize:16}}>{i}</span>{l}</button>)}</nav>
      <div style={{padding:"0 10px",marginTop:12}}><button onClick={()=>{setCu(null);setPage("home");setSo(false)}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 14px",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"inherit",direction:"rtl",textAlign:"right",background:"rgba(239,68,68,0.1)",color:"#f87171"}}>🚪 خروج</button></div>
    </aside>
    <main style={{flex:1,marginRight:isMobile?0:260,padding:isMobile?"60px 16px 16px":"28px 36px",overflowY:"auto",minHeight:"100vh"}}>
      {page==="home"&&<Home user={cu} isT={isT} assignments={assignments} submissions={submissions} students={students} quizResults={quizResults} announcements={announcements} updateAnnouncements={uAn} setPage={setPage}/>}
      {page==="lessons"&&<LessonsP isT={isT} teacherContent={teacherContent} updateTC={uTC} quizzes={quizzes} updateQ={uQz}/>}
      {page==="assignments"&&<AssignP isT={isT} user={cu} assignments={assignments} updateA={uAsn} submissions={submissions} updateS={uSub}/>}
      {page==="quizzes"&&<QuizP isT={isT} user={cu} quizzes={quizzes} updateQ={uQz} quizResults={quizResults} updateQR={uQR}/>}
      {page==="chat"&&<ChatP user={cu} isT={isT} chatMessages={chatMessages} updateChat={uCh} students={students}/>}
      {page==="honor"&&<HonorP isT={isT} honorBoard={honorBoard} updateH={uHn} students={students}/>}
      {page==="reports"&&isT&&<ReportsP students={students} assignments={assignments} submissions={submissions} quizResults={quizResults}/>}
      {page==="links"&&<LinksP/>}
      {page==="students"&&isT&&<StudentsP students={students} updateStudents={uStu} submissions={submissions} quizResults={quizResults}/>}
    </main>
    {so&&isMobile&&<div onClick={()=>setSo(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:999}}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
